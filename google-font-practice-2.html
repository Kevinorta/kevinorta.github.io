<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Banner</title>
    
    <link href='https://fonts.googleapis.com/css?family=Titillium+Web' rel='stylesheet' type='text/css'>
    <link href='https://fonts.googleapis.com/css?family=Josefin+Slab' rel='stylesheet' type='text/css'>
    
    <style type="text/css">
        .banner {
            position: relative;
            top:-10px;
            left:-10px;
            overflow:hidden;
            width: 100%;
            font-size: 3em;
            text-align: center;
            line-height: 1.5;
            padding: 20px;
        }
        
        .bg {
            height: 110%;
            width: 105%;
            position: absolute;
            top: -15px;
            left: -15px;
            z-index: -1;
            background: linear-gradient( 
            /*top*/
            rgba(20, 0, 0, 0.5), 
            /*bottom*/
            rgba(10, 0, 0, 0.5)), 
            /*URL*/
            url(
            'https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/New_York_City_Skyline_%2B_NYC_at_Night_-_Kyle_Kirschbaum.JPG/1024px-New_York_City_Skyline_%2B_NYC_at_Night_-_Kyle_Kirschbaum.JPG'
            );
            background-size: cover;
            /* put any filters below */
            /*http://blog.teamtreehouse.com/css-filter-effects*/
            
        }
        
        /*change the fonts here*/
        h1 {
            font-family: 'Josefin Slab', serif;
        }
        
        h2 {
            font-size:0.8em;
            font-family: 'Titillium Web', serif;
        }
        
        h1,
        h2 {
            color: white;
            /*letter-spacing: 10px;*/
        }
    </style>
</head>

<body>
    <div class="banner">
        <div class="bg"></div>
        <h1>Kevin Orta</h1>
        <h2>I am Kevin Orta</h2>
    </div>
</body>

</html>
